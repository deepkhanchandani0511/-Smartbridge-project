version: "3.8"

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: drishyamitra-db
    environment:
      POSTGRES_DB: drishyamitra
      POSTGRES_USER: drishyamitra_user
      POSTGRES_PASSWORD: drishyamitra_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U drishyamitra_user"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - drishyamitra-network

  # Redis Cache and Message Broker
  redis:
    image: redis:7-alpine
    container_name: drishyamitra-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - drishyamitra-network

  # Flask Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: drishyamitra-backend
    environment:
      - DATABASE_URL=postgresql://drishyamitra_user:drishyamitra_password@postgres:5432/drishyamitra
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - FLASK_ENV=production
      - SECRET_KEY=${SECRET_KEY:-your-secret-key-change-in-production}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-jwt-secret-key-change-in-production}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - GMAIL_EMAIL=${GMAIL_EMAIL}
      - GMAIL_PASSWORD=${GMAIL_PASSWORD}
      - WHATSAPP_API_URL=${WHATSAPP_API_URL:-http://localhost:3001}
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend/data:/app/data
      - ./backend/logs:/app/logs
    networks:
      - drishyamitra-network
    restart: unless-stopped

  # Celery Worker
  celery:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: drishyamitra-celery
    command: celery -A workers.celery_worker worker -l INFO
    environment:
      - DATABASE_URL=postgresql://drishyamitra_user:drishyamitra_password@postgres:5432/drishyamitra
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - GROQ_API_KEY=${GROQ_API_KEY}
      - GMAIL_EMAIL=${GMAIL_EMAIL}
      - GMAIL_PASSWORD=${GMAIL_PASSWORD}
    depends_on:
      - backend
      - redis
      - postgres
    volumes:
      - ./backend/data:/app/data
    networks:
      - drishyamitra-network
    restart: unless-stopped

  # React Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: drishyamitra-frontend
    environment:
      - VITE_API_URL=${VITE_API_URL:-http://localhost:5000/api}
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - drishyamitra-network
    restart: unless-stopped

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: drishyamitra-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./backend/data:/var/www/data:ro
    depends_on:
      - backend
      - frontend
    networks:
      - drishyamitra-network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

networks:
  drishyamitra-network:
    driver: bridge
